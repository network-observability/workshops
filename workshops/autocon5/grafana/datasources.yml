---
apiVersion: 1

datasources:
  - name: prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true

  - name: loki
    type: loki
    url: http://loki:3001
    access: proxy

  # Infrahub source-of-truth — replaces the Nautobot GraphQL datasource from
  # the webinar-completed scenario. Grafana queries Infrahub via GraphQL with
  # the workshop's API token, which is seeded by INFRAHUB_INITIAL_ADMIN_TOKEN
  # on first boot of infrahub-server.
  - name: infrahub
    type: fifemon-graphql-datasource
    url: http://infrahub-server:8000/graphql
    editable: true
    jsonData:
      httpHeaderName1: X-INFRAHUB-KEY
    secureJsonData:
      httpHeaderValue1: ${INFRAHUB_API_TOKEN}

  - name: infinity
    type: yesoreyeram-infinity-datasource
    editable: true
