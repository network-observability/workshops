[agent]
  hostname = "telegraf-02"


###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
# Scrape metrics from sonda-server via exec plugin.
# The scrape script discovers all running scenarios and fetches their
# Prometheus text metrics from the /scenarios/{id}/metrics endpoint.
#
# This replaces the gNMI and SNMP inputs from the webinar-completed scenario.
# Instead of collecting from a real Nokia SRLinux device, telegraf collects
# synthetic metrics generated by sonda-server.
[[inputs.exec]]
  commands = ["/scripts/scrape-sonda-metrics.sh"]
  timeout = "15s"
  interval = "10s"
  data_format = "prometheus"

  [inputs.exec.tags]
    collection_type = "sonda"


###############################################################################
#                            DATA NORMALIZATION                               #
###############################################################################
# Telegraf processors demonstrate the normalization pipeline.
# In the webinar-completed scenario, these processors rename gNMI/SNMP tags
# (source → device) and map string enum values to integers.
# With sonda, the metrics are already normalized, but the processors are kept
# to show how the pipeline works and for educational value.

[[processors.enum]]
  namepass = ["interface*"]

  [[processors.enum.tagpass]]
    collection_type = ["sonda"]

  [[processors.enum.mapping]]
    field = "oper_state"
    [processors.enum.mapping.value_mappings]
      up = 1
      down = 2

  [[processors.enum.mapping]]
    field = "admin_state"
    [processors.enum.mapping.value_mappings]
      enable = 1
      disable = 2

[[processors.enum]]
  namepass = ["bgp*"]

  [[processors.enum.mapping]]
    field = "admin_state"
    [processors.enum.mapping.value_mappings]
      enable = 1
      disable = 2

  [[processors.enum.mapping]]
    field = "oper_state"
    [processors.enum.mapping.value_mappings]
      up = 1
      down = 2
      idle = 3
      connect = 4
      active = 5


###############################################################################
#                            DATA ENRICHMENT                                  #
###############################################################################
[[processors.regex]]
  namepass = ["interface*"]

  [processors.regex.tagpass]
      device = ["srl2"]

  [[processors.regex.tags]]
    key = "name"
    pattern = "^ethernet.*$"
    result_key = "intf_role"
    replacement = "peer"

  [[processors.regex.tags]]
    key = "name"
    pattern = "^mgmt.*$"
    result_key = "intf_role"
    replacement = "mgmt"


##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
[[outputs.file]]
  files = ["stdout"]


[[outputs.prometheus_client]]
  # HTTP port to listen on — Prometheus scrapes this endpoint
  listen = ":9005"
  # v2 emits `<field>{tags}` (e.g. `bgp_oper_state{...}`); v1 (default) emits
  # `<measurement>_<field>{tags}`, which would yield `prometheus_bgp_oper_state`
  # since the prometheus parser uses "prometheus" as the measurement name.
  # The alert rules and dashboards query the raw metric names, so v2 is required.
  metric_version = 2
