[agent]
  hostname = "telegraf-02"


###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
# Scrape sonda-server's per-scenario Prometheus text endpoints. The
# script reads scenario IDs from /shared/scenario-ids.txt (written by
# sonda-setup) and curls each `/scenarios/{id}/metrics`.

[[inputs.exec]]
  commands = ["/scripts/scrape-sonda-metrics.sh"]
  timeout = "15s"
  interval = "10s"
  data_format = "prometheus"

  [inputs.exec.tags]
    pipeline = "telegraf"


###############################################################################
#                            DATA NORMALIZATION                               #
###############################################################################
# Strip the vendor `srl_` prefix to converge srl2 series with srl1's
# canonical names. `field_rename` (not `metric_rename`) because the
# Prometheus parser keeps measurement="prometheus" and uses the metric
# name as the field; `metric_version=2` then publishes the field name.
[[processors.regex]]
  order = 1

  [[processors.regex.field_rename]]
    pattern = "^srl_(.*)$"
    replacement = "${1}"

# gNMI's device-identifier tag is `source`; canonical schema uses `device`.
[[processors.rename]]
  order = 2

  [[processors.rename.replace]]
    tag = "source"
    dest = "device"


###############################################################################
#                            DATA ENRICHMENT                                  #
###############################################################################
# Derive `intf_role` from the `name` tag. No namepass needed — the regex
# only matches `ethernet*` / `mgmt*`, so BGP (`name="default"`) and
# system metrics pass through unchanged.
[[processors.regex]]
  order = 3

  [processors.regex.tagpass]
      device = ["srl2"]

  [[processors.regex.tags]]
    key = "name"
    pattern = "^ethernet.*$"
    result_key = "intf_role"
    replacement = "peer"

  [[processors.regex.tags]]
    key = "name"
    pattern = "^mgmt.*$"
    result_key = "intf_role"
    replacement = "mgmt"


##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
[[outputs.file]]
  files = ["stdout"]


[[outputs.prometheus_client]]
  # HTTP port to listen on — Prometheus scrapes this endpoint
  listen = ":9005"
  # v2 emits `<field>{tags}` (e.g. `bgp_oper_state{...}`); v1 (default) emits
  # `<measurement>_<field>{tags}`. The alert rules and dashboards query the
  # raw metric names, so v2 is required.
  metric_version = 2
