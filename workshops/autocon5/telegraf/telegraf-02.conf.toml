[agent]
  hostname = "telegraf-02"


###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
# Scrape sonda-server's per-scenario Prometheus text endpoints. The script
# discovers running scenario IDs from a shared file written by sonda-setup
# and curls each `/scenarios/{id}/metrics`.
#
# srl2 emits the **raw gNMI shape** via the `srlinux_gnmi_*_raw` packs:
# `srl_bgp_*` / `srl_interface_*` measurement names with a `source` tag.
# The processor chain below renames those into the canonical schema
# (`bgp_*` / `interface_*` + `device` tag) before output. This mirrors
# the webinar-completed lab's `inputs.gnmi` pipeline.

[[inputs.exec]]
  commands = ["/scripts/scrape-sonda-metrics.sh"]
  timeout = "15s"
  interval = "10s"
  data_format = "prometheus"

  [inputs.exec.tags]
    pipeline = "telegraf"


###############################################################################
#                            DATA NORMALIZATION                               #
###############################################################################
# Strip the vendor `srl_` prefix from every field so srl2 series converge
# with srl1's canonical names in Prometheus. The Prometheus parser keeps
# measurement="prometheus" and uses the metric name as the field name; with
# `metric_version=2` the field name becomes the published metric name.
# Same harmonization you'd run when collecting from multiple gNMI YANG
# models (SR Linux / Junos / IOS XR).
[[processors.regex]]
  order = 1

  [[processors.regex.field_rename]]
    pattern = "^srl_(.*)$"
    replacement = "${1}"

# gNMI's default tag for the device identifier is `source`; the canonical
# schema uses `device`. Mirrors the webinar's `processors.rename` block.
[[processors.rename]]
  order = 2

  [[processors.rename.replace]]
    tag = "source"
    dest = "device"


###############################################################################
#                            DATA ENRICHMENT                                  #
###############################################################################
# Derive `intf_role` from the interface `name` tag pattern. The regex
# only sets `intf_role` when the pattern matches, so BGP metrics
# (`name="default"`) and system metrics aren't affected.
[[processors.regex]]
  order = 3

  [processors.regex.tagpass]
      device = ["srl2"]

  [[processors.regex.tags]]
    key = "name"
    pattern = "^ethernet.*$"
    result_key = "intf_role"
    replacement = "peer"

  [[processors.regex.tags]]
    key = "name"
    pattern = "^mgmt.*$"
    result_key = "intf_role"
    replacement = "mgmt"


##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
[[outputs.file]]
  files = ["stdout"]


[[outputs.prometheus_client]]
  # HTTP port to listen on — Prometheus scrapes this endpoint
  listen = ":9005"
  # v2 emits `<field>{tags}` (e.g. `bgp_oper_state{...}`); v1 (default) emits
  # `<measurement>_<field>{tags}`. The alert rules and dashboards query the
  # raw metric names, so v2 is required.
  metric_version = 2
