[agent]
  hostname = "telegraf-srl2"


###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
# Scrape sonda's aggregate /metrics, filtered to srl2 (SNMP-raw shape).
[[inputs.prometheus]]
  urls = ["http://sonda-server:8080/metrics?label=agent_host:srl2"]
  metric_version = 2
  tagexclude = ["url", "host"]

  [inputs.prometheus.tags]
    pipeline = "telegraf"


###############################################################################
#                            DATA NORMALIZATION                               #
###############################################################################
# IF-MIB / BGP4-MIB / CISCO-BGP4-MIB names + tags → canonical schema.
[[processors.rename]]
  order = 1

  # Interface metrics — IF-MIB
  [[processors.rename.replace]]
    field = "ifAdminStatus"
    dest = "interface_admin_state"
  [[processors.rename.replace]]
    field = "ifOperStatus"
    dest = "interface_oper_state"
  [[processors.rename.replace]]
    field = "ifHCInOctets"
    dest = "interface_in_octets"
  [[processors.rename.replace]]
    field = "ifHCOutOctets"
    dest = "interface_out_octets"

  # BGP metrics — BGP4-MIB + CISCO-BGP4-MIB
  [[processors.rename.replace]]
    field = "bgpPeerAdminStatus"
    dest = "bgp_admin_state"
  [[processors.rename.replace]]
    field = "cbgpPeerOperStatus"
    dest = "bgp_oper_state"
  [[processors.rename.replace]]
    field = "bgpPeerState"
    dest = "bgp_neighbor_state"
  [[processors.rename.replace]]
    field = "bgpPeerInPrefixes"
    dest = "bgp_received_routes"
  [[processors.rename.replace]]
    field = "cbgpPeerAcceptedPrefixes"
    dest = "bgp_prefixes_accepted"
  [[processors.rename.replace]]
    field = "bgpPeerOutPrefixes"
    dest = "bgp_sent_routes"
  [[processors.rename.replace]]
    field = "cbgpPeerActivePrefixes"
    dest = "bgp_active_routes"

  # Tag renames — SNMP-style → canonical
  [[processors.rename.replace]]
    tag = "agent_host"
    dest = "device"
  [[processors.rename.replace]]
    tag = "ifDescr"
    dest = "name"
  [[processors.rename.replace]]
    tag = "bgpPeerRemoteAddr"
    dest = "peer_address"
  [[processors.rename.replace]]
    tag = "bgpPeerRemoteAs"
    dest = "neighbor_asn"


###############################################################################
#                            DATA ENRICHMENT                                  #
###############################################################################
# Derive `intf_role` from `name` (post-rename). Non-matching tags pass through.
[[processors.regex]]
  order = 2

  [processors.regex.tagpass]
      device = ["srl2"]

  [[processors.regex.tags]]
    key = "name"
    pattern = "^ethernet.*$"
    result_key = "intf_role"
    replacement = "peer"

  [[processors.regex.tags]]
    key = "name"
    pattern = "^mgmt.*$"
    result_key = "intf_role"
    replacement = "mgmt"


##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
[[outputs.file]]
  files = ["stdout"]


[[outputs.prometheus_client]]
  listen = ":9005"
  metric_version = 2
