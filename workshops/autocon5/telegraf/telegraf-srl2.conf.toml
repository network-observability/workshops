[agent]
  hostname = "telegraf-srl2"


###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
# Scrape sonda-server's aggregate /metrics endpoint, filtered to srl2 via
# the `agent_host` label. sonda-srl2 emits the SNMP-raw shape (IF-MIB /
# BGP4-MIB / CISCO-BGP4-MIB names and tags). Cascade samples land in the
# same endpoint with the same raw names and labels — `flap-interface`
# DELETEs the baseline scenarios for the flapped interface/peers and
# POSTs the cascade as the sole emitter.
[[inputs.prometheus]]
  urls = ["http://sonda-server:8080/metrics?label=agent_host:srl2"]
  metric_version = 2
  # Strip Telegraf's default scrape-noise tags so they don't show up in Prom.
  tagexclude = ["url", "host"]

  [inputs.prometheus.tags]
    pipeline = "telegraf"


###############################################################################
#                            DATA NORMALIZATION                               #
###############################################################################
# IF-MIB / BGP4-MIB / CISCO-BGP4-MIB metric names → canonical schema.
# The prometheus parser keeps measurement="prometheus" and uses the
# metric name as the field; metric_version=2 below publishes the field
# name as the Prometheus metric name. `field = ...` renames the metric
# name, `tag = ...` renames label keys.
[[processors.rename]]
  order = 1

  # Interface metrics — IF-MIB
  [[processors.rename.replace]]
    field = "ifAdminStatus"
    dest = "interface_admin_state"
  [[processors.rename.replace]]
    field = "ifOperStatus"
    dest = "interface_oper_state"
  [[processors.rename.replace]]
    field = "ifHCInOctets"
    dest = "interface_in_octets"
  [[processors.rename.replace]]
    field = "ifHCOutOctets"
    dest = "interface_out_octets"

  # BGP metrics — BGP4-MIB + CISCO-BGP4-MIB
  [[processors.rename.replace]]
    field = "bgpPeerAdminStatus"
    dest = "bgp_admin_state"
  [[processors.rename.replace]]
    field = "cbgpPeerOperStatus"
    dest = "bgp_oper_state"
  [[processors.rename.replace]]
    field = "bgpPeerState"
    dest = "bgp_neighbor_state"
  [[processors.rename.replace]]
    field = "bgpPeerInPrefixes"
    dest = "bgp_received_routes"
  [[processors.rename.replace]]
    field = "cbgpPeerAcceptedPrefixes"
    dest = "bgp_prefixes_accepted"
  [[processors.rename.replace]]
    field = "bgpPeerOutPrefixes"
    dest = "bgp_sent_routes"
  [[processors.rename.replace]]
    field = "cbgpPeerActivePrefixes"
    dest = "bgp_active_routes"

  # Tag renames — SNMP-style → canonical
  [[processors.rename.replace]]
    tag = "agent_host"
    dest = "device"
  [[processors.rename.replace]]
    tag = "ifDescr"
    dest = "name"
  [[processors.rename.replace]]
    tag = "bgpPeerRemoteAddr"
    dest = "peer_address"
  [[processors.rename.replace]]
    tag = "bgpPeerRemoteAs"
    dest = "neighbor_asn"


###############################################################################
#                            DATA ENRICHMENT                                  #
###############################################################################
# Derive `intf_role` from the `name` tag (post-rename). The regex only
# matches `ethernet*` / `mgmt*`, so BGP (`name="default"`) and system
# metrics pass through unchanged.
[[processors.regex]]
  order = 2

  [processors.regex.tagpass]
      device = ["srl2"]

  [[processors.regex.tags]]
    key = "name"
    pattern = "^ethernet.*$"
    result_key = "intf_role"
    replacement = "peer"

  [[processors.regex.tags]]
    key = "name"
    pattern = "^mgmt.*$"
    result_key = "intf_role"
    replacement = "mgmt"


##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
[[outputs.file]]
  files = ["stdout"]


[[outputs.prometheus_client]]
  # HTTP port to listen on — Prometheus scrapes this endpoint
  listen = ":9005"
  # v2 emits `<field>{tags}` (e.g. `bgp_oper_state{...}`); v1 (default) emits
  # `<measurement>_<field>{tags}`. The alert rules and dashboards query the
  # raw metric names, so v2 is required.
  metric_version = 2
