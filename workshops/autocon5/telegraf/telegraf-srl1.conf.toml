[agent]
  hostname = "telegraf-srl1"


###############################################################################
#                            DATA COLLECTION                                  #
###############################################################################
# Scrape sonda's aggregate /metrics, filtered to srl1 (gNMI shape).
[[inputs.prometheus]]
  urls = ["http://sonda-server:8080/metrics?label=source:srl1"]
  metric_version = 2
  tagexclude = ["url", "host"]

  [inputs.prometheus.tags]
    pipeline = "telegraf"


###############################################################################
#                            DATA NORMALIZATION                               #
###############################################################################
# Strip the `srl_` prefix to converge with srl2's canonical names.
[[processors.regex]]
  order = 1

  [[processors.regex.field_rename]]
    pattern = "^srl_(.*)$"
    replacement = "${1}"

# gNMI's device-identifier tag is `source`; canonical schema uses `device`.
[[processors.rename]]
  order = 2

  [[processors.rename.replace]]
    tag = "source"
    dest = "device"


###############################################################################
#                            DATA ENRICHMENT                                  #
###############################################################################
# Derive `intf_role` from `name`. Non-matching tags (BGP, system) pass through.
[[processors.regex]]
  order = 3

  [processors.regex.tagpass]
      device = ["srl1"]

  [[processors.regex.tags]]
    key = "name"
    pattern = "^ethernet.*$"
    result_key = "intf_role"
    replacement = "peer"

  [[processors.regex.tags]]
    key = "name"
    pattern = "^mgmt.*$"
    result_key = "intf_role"
    replacement = "mgmt"


##############################################################################
#                            DATA OUTPUT                                     #
##############################################################################
[[outputs.file]]
  files = ["stdout"]


[[outputs.prometheus_client]]
  listen = ":9005"
  metric_version = 2
