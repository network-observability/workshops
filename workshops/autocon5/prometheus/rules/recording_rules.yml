---
groups:
  - name: network_traffic_overview
    rules:
    - record: device:network_traffic_in_bps:rate_2m
      expr: sum(rate(interface_in_octets[2m])) by (device) * 8
    - record: device:network_traffic_out_bps:rate_2m
      expr: sum(rate(interface_out_octets[2m])) by (device) * 8

  # Recording rule that fans the Loki-generated UPDOWN rate back into Prom,
  # falling back to a constant 0 per device when no UPDOWN events exist yet
  # so the dashboard panel always has at least one series per device.
  # NOTE: sonda emits interface_admin_state (not interface_admin_status as in
  # the original sonda-integration scenario, which was a leftover from the
  # gNMI-shaped naming). Updated to match.
  - name: interface_updown_events
    rules:
    - record: device:interface_updown_rate:2m
      expr: events:interface_updown_rate:2m or (sum by (device) (interface_admin_state) * 0)
