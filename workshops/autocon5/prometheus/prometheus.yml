---
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:9090"]

  # Both devices' baseline telemetry flows through Telegraf, one collector
  # per device. telegraf-srl1 receives gNMI-raw via remote_write from
  # sonda-srl1; telegraf-srl2 scrapes the SNMP-raw shape from sonda-server.
  # Each renames its raw shape to the canonical schema before re-exposing
  # to Prometheus.
  - job_name: "telegraf-srl1"
    scrape_interval: 15s
    static_configs:
      - targets: ["telegraf-srl1:9005"]
  - job_name: "telegraf-srl2"
    scrape_interval: 15s
    static_configs:
      - targets: ["telegraf-srl2:9005"]

rule_files:
  - rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 5s
