# SR Linux gNMI BGP per-peer metrics — RAW shape, pre-Telegraf-normalization.
#
# Mirrors what Telegraf's `inputs.gnmi` would emit BEFORE the processor
# chain runs against an SR Linux device:
#   - measurement-prefixed names (`srl_bgp_*`) representing the vendor's
#     YANG model — students see Telegraf's `processors.rename` rewrite
#     these to the canonical schema.
#   - `source` tag carries the device identifier (gNMI default); Telegraf
#     renames `source` -> `device`.
#
# The numeric encodings match the post-normalization values, because
# sonda metrics are f64 (no string fields). The webinar-completed lab's
# `processors.enum` does the string->int step against a real device;
# here Telegraf only does name + tag rewrites. See telegraf-02.conf.toml.

name: srlinux_gnmi_bgp_raw
description: "SR Linux gNMI BGP per-peer metrics (raw, pre-normalization)"
category: network

shared_labels:
  source: ""             # Telegraf renames -> device
  peer_address: ""
  neighbor_asn: ""
  afi_safi_name: ipv4-unicast
  name: default
  collection_type: gnmi

metrics:
  - name: srl_bgp_neighbor_state
    generator:
      type: constant
      value: 1.0

  - name: srl_bgp_admin_state
    generator:
      type: constant
      value: 1.0

  - name: srl_bgp_oper_state
    generator:
      type: constant
      value: 1.0

  - name: srl_bgp_received_routes
    generator:
      type: constant
      value: 10.0

  - name: srl_bgp_prefixes_accepted
    generator:
      type: constant
      value: 10.0

  - name: srl_bgp_sent_routes
    generator:
      type: constant
      value: 10.0

  - name: srl_bgp_active_routes
    generator:
      type: constant
      value: 10.0
