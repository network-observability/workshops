# AutoCon5 BGP cascade — declarative `while:` gating on an interface flap.
#
# Reference target: srl1 ethernet-1/1 ↔ peer 10.1.2.2 (ASN 65102). When
# the workshop CLI is invoked with a different device/interface,
# `flap.py` rebuilds the body in memory using `flap_topology.peers_for()`.
#
# Pipeline:
#   primary_flap (interface_oper_state via `enum: oper_state` — UP=1, DOWN=2)
#     └─ while > 1, delay open=10s close=0s ─► BGP per-peer metrics + UPDOWN logs
#
# Restore is automatic on gate close: each gated entry sets
# `delay.close.snap_to` to its established-state value (matching the BGP
# pack defaults), so on `running -> paused` sonda writes that recovered
# value once before pausing. The cascade series snaps to `bgp_oper_state=1`,
# `bgp_*_routes=10`, etc — alerts that test `!= 1` resolve on the next
# scrape. This is the explicit-recovery alternative to the default stale-NaN
# marker; we use snap_to because some Prometheus deployments don't honor
# remote_write stale-NaN samples in their query engine, and snap_to
# bypasses that whole class of receiver-side handling.
---
version: 2

scenario_name: autocon5-cascade-incident
category: network
description: "AutoCon5 BGP cascade — declarative while: gating on interface flap."

defaults:
  rate: 1
  duration: 4m
  encoder:
    type: remote_write
  sink:
    type: remote_write
    url: "${PROMETHEUS_REMOTE_WRITE_URL:-http://prometheus:9090/api/v1/write}"
  labels:
    device: srl1
    pipeline: telegraf
    collection_type: gnmi
    # Telegraf scrape provenance — matches what telegraf-srl1 would add via
    # Prom's scrape job. Setting these explicitly lets the cascade's series
    # share an exact label set with the baseline series, so a query like
    # `interface_oper_state{device="srl1"}` shows ONE line that flips up/down
    # rather than two parallel series with mismatched labels.
    host: telegraf-srl1
    instance: telegraf-srl1:9005
    job: telegraf-srl1

scenarios:
  - id: primary_flap
    signal_type: metrics
    name: interface_oper_state
    generator:
      type: flap
      up_duration: 30s
      down_duration: 60s
      enum: oper_state
    labels:
      name: ethernet-1/1
      intf_role: peer

  - id: bgp_oper_state_down
    signal_type: metrics
    name: bgp_oper_state
    generator:
      type: constant
      value: 2.0
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close:
        duration: 0s
        snap_to: 1.0
    labels:
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
      name: default
      afi_safi_name: ipv4-unicast

  - id: bgp_neighbor_state_down
    signal_type: metrics
    name: bgp_neighbor_state
    generator:
      type: constant
      value: 1.0
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close:
        duration: 0s
        snap_to: 1.0
    labels:
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
      name: default
      afi_safi_name: ipv4-unicast

  - id: bgp_prefixes_accepted_down
    signal_type: metrics
    name: bgp_prefixes_accepted
    generator:
      type: constant
      value: 0.0
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close:
        duration: 0s
        snap_to: 10.0
    labels:
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
      name: default
      afi_safi_name: ipv4-unicast

  - id: bgp_received_routes_down
    signal_type: metrics
    name: bgp_received_routes
    generator:
      type: constant
      value: 0.0
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close:
        duration: 0s
        snap_to: 10.0
    labels:
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
      name: default
      afi_safi_name: ipv4-unicast

  - id: bgp_sent_routes_down
    signal_type: metrics
    name: bgp_sent_routes
    generator:
      type: constant
      value: 0.0
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close:
        duration: 0s
        snap_to: 10.0
    labels:
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
      name: default
      afi_safi_name: ipv4-unicast

  - id: bgp_active_routes_down
    signal_type: metrics
    name: bgp_active_routes
    generator:
      type: constant
      value: 0.0
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close:
        duration: 0s
        snap_to: 10.0
    labels:
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
      name: default
      afi_safi_name: ipv4-unicast

  - id: updown_logs_down
    signal_type: logs
    name: updown_logs_down
    rate: 0.5
    while:
      ref: primary_flap
      op: ">"
      value: 1
    delay:
      open: 10s
      close: 0s
    labels:
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      interface: ethernet-1/1
      interface_status: down
    log_generator:
      type: template
      templates:
        - message: "Interface ethernet-1/1 changed state to down"
      severity_weights:
        warning: 1.0
    encoder:
      type: json_lines
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
