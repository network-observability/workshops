# srl2 telemetry — served by sonda-server, scraped by telegraf-02.
#
# Schema: sonda v2 (https://docs.davidban77.com/sonda/configuration/v2-scenarios/).
# This file is POST'ed to sonda-server by sonda-setup.sh and is then exposed
# at `/scenarios/{id}/metrics` for telegraf-02 to scrape (Prometheus text).
#
# Broken-on-purpose:
#   - Peer 10.1.11.1 (BGP):     bgp_oper_state = 5  -> trips BgpSessionNotUp
#   - Interface ethernet-1/11:  interface_oper_state = 2  -> trips InterfaceAdminUpOperDown
---
version: 2

scenario_name: autocon5-srl2-metrics
category: network
description: "AutoCon5 srl2 telemetry served by sonda-server (scraped by telegraf-02)."

defaults:
  rate: 0.1
  # No encoder/sink set — sonda-server defaults to prometheus_text in-memory
  # buffer exposed at /scenarios/{id}/metrics for the scraper.

scenarios:
  # =========================================================================
  # BGP peers
  # =========================================================================
  - id: bgp_peer_10_1_2_1
    signal_type: metrics
    pack: srlinux_gnmi_bgp
    labels:
      device: srl2
      peer_address: "10.1.2.1"

  - id: bgp_peer_10_1_7_1
    signal_type: metrics
    pack: srlinux_gnmi_bgp
    labels:
      device: srl2
      peer_address: "10.1.7.1"

  - id: bgp_peer_10_1_11_1_broken
    signal_type: metrics
    pack: srlinux_gnmi_bgp
    labels:
      device: srl2
      peer_address: "10.1.11.1"
    overrides:
      bgp_oper_state:
        generator:
          type: constant
          value: 5.0
      bgp_received_routes:
        generator:
          type: constant
          value: 0.0

  # =========================================================================
  # Interfaces
  # =========================================================================
  - id: intf_ethernet_1_1
    signal_type: metrics
    pack: srlinux_gnmi_interface
    labels:
      device: srl2
      name: "ethernet-1/1"

  - id: intf_ethernet_1_10
    signal_type: metrics
    pack: srlinux_gnmi_interface
    labels:
      device: srl2
      name: "ethernet-1/10"

  - id: intf_ethernet_1_11_broken
    signal_type: metrics
    pack: srlinux_gnmi_interface
    labels:
      device: srl2
      name: "ethernet-1/11"
    overrides:
      interface_oper_state:
        generator:
          type: constant
          value: 2.0
      interface_in_octets:
        generator:
          type: constant
          value: 0.0
      interface_out_octets:
        generator:
          type: constant
          value: 0.0

  # =========================================================================
  # System
  # =========================================================================
  - id: system_cpu_used
    signal_type: metrics
    name: cpu_used
    labels:
      device: srl2
      slot: A
      index: "0"
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 18.0
      offset: 30.0
      period_secs: 150.0
    jitter: 2.0

  - id: system_memory_used
    signal_type: metrics
    name: memory_used
    labels:
      device: srl2
      slot: A
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 6.0
      offset: 38.0
      period_secs: 200.0
    jitter: 1.0

  - id: system_uptime
    signal_type: metrics
    name: device_uptime
    labels:
      device: srl2
      collection_type: snmp
    generator:
      type: step
      start: 36000.0
      step_size: 100.0
