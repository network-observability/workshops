# Log scenarios for srl1 and srl2.
#
# srl1 — direct push to Loki via sonda's `loki` sink.
# srl2 — RFC 5424 syslog over UDP into Vector (vector:1514). Vector
# decodes the syslog frame, promotes the SD `[sonda ...]` payload to
# Loki labels, and forwards to the same Loki. The curriculum point is
# to show two valid pipelines side-by-side; the `pipeline` label
# distinguishes them in dashboards.
#
# Schema: sonda v2. Logs use `log_generator:`.
---
version: 2

scenario_name: autocon5-all-logs
category: network
description: "AutoCon5 syslog + UPDOWN + BGP logs for srl1 and srl2."

defaults:
  rate: 0.05
  # Default encoder for logs is json_lines (per encoders.md), so we omit it.
  sink:
    type: loki
    url: "${LOKI_URL:-http://loki:3001}"

scenarios:

  # =========================================================================
  # srl1 — general system logs (mgmt / aaa / chassis)
  #
  # vendor_facility_process rotates across the three subsystems via
  # dynamic_labels so each stream matches what the webinar lab produced
  # from real SR Linux syslog.
  # =========================================================================
  - id: srl1_system_logs
    signal_type: logs
    name: srl1_system_logs
    labels:
      device: srl1
      pipeline: direct
      type: srlinux
      vendor_facility: srlinux
      netpanda: bethepacket
    dynamic_labels:
      - key: vendor_facility_process
        values: ["MGMT", "AAA", "CHASSIS"]
    log_generator:
      type: template
      templates:
        - message: "mgmt|2456|17|00071|Configuration committed by user {user}"
          field_pools:
            user: ["netobs", "admin"]
        - message: "aaa|2310|17|00045|User {user} logged in via {method}"
          field_pools:
            user: ["netobs", "admin"]
            method: ["ssh", "console", "api"]
        - message: "chassis|1044|8|00012|Temperature sensor {sensor}: {temp}C (threshold: 70C)"
          field_pools:
            sensor: ["inlet", "outlet", "cpu"]
            temp: ["32", "35", "38", "41"]
      # severity_weights drives the body's `severity` field. We removed the
      # static `level: info` label so the stream label and body don't
      # contradict each other.
      severity_weights:
        info: 0.8
        warn: 0.15
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 1

  # -------------------------------------------------------------------------
  # srl1 — interface UPDOWN events for the HEALTHY interfaces (1/1, 1/10).
  # Triggers PeerInterfaceFlapping (loki/rules: count_over_time UPDOWN > 3 in 2m).
  # The broken interface ethernet-1/11 has its own dedicated stream below
  # so a student querying logs for the broken interface sees a coherent
  # stuck-down story, not the same uniform rotation as the healthy links.
  # -------------------------------------------------------------------------
  - id: srl1_updown_logs
    signal_type: logs
    name: srl1_updown_logs
    rate: 0.05               # ~6 events / 2 min, exceeds the alert's threshold
    labels:
      device: srl1
      pipeline: direct
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      netpanda: bethepacket
    dynamic_labels:
      - key: interface
        values: ["ethernet-1/1", "ethernet-1/10"]
      - key: interface_status
        values: ["up", "down"]
    log_generator:
      type: template
      templates:
        - message: "Interface state transition observed (operational state changed)"
      severity_weights:
        warning: 1.0
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 5

  # -------------------------------------------------------------------------
  # srl1 — broken interface ethernet-1/11. Stuck-down story so the metric's
  # interface_oper_state=2 has matching log evidence a student can find with
  # the metric-to-log bridge query.
  # -------------------------------------------------------------------------
  - id: srl1_broken_interface_logs
    signal_type: logs
    name: srl1_broken_interface_logs
    rate: 0.02               # ~1 line every 50s — sustained but not spammy
    labels:
      device: srl1
      pipeline: direct
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      interface: "ethernet-1/11"
      interface_status: "down"
      netpanda: bethepacket
    log_generator:
      type: template
      templates:
        - message: "Interface ethernet-1/11: admin-up but operational down — no link partner detected"
        - message: "Interface ethernet-1/11: still no link, last seen up: never since boot"
        - message: "Interface ethernet-1/11: physical layer reports cable absent or far-end unresponsive"
      severity_weights:
        warning: 1.0
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 1

  # -------------------------------------------------------------------------
  # srl1 — BGP session events for the HEALTHY peers. Uniform state rotation
  # is fine for these — they're not the broken thing the curriculum asks
  # students to find. The broken peer 10.1.99.2 has its own dedicated stream
  # below so the metric-to-log bridge has a coherent payoff.
  # -------------------------------------------------------------------------
  - id: srl1_bgp_logs_peer_10_1_2_2
    signal_type: logs
    name: srl1_bgp_logs_peer_10_1_2_2
    labels:
      device: srl1
      pipeline: direct
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      peer_address: "10.1.2.2"
      netpanda: bethepacket
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor 10.1.2.2: state changed to {state}"
          field_pools:
            state: ["established", "active", "open-confirm", "idle"]
      severity_weights:
        info: 0.7
        warning: 0.25
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 1

  - id: srl1_bgp_logs_peer_10_1_7_2
    signal_type: logs
    name: srl1_bgp_logs_peer_10_1_7_2
    labels:
      device: srl1
      pipeline: direct
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      peer_address: "10.1.7.2"
      netpanda: bethepacket
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor 10.1.7.2: state changed to {state}"
          field_pools:
            state: ["established", "active", "open-confirm", "idle"]
      severity_weights:
        info: 0.7
        warning: 0.25
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 1

  # -------------------------------------------------------------------------
  # srl1 — broken BGP peer 10.1.99.2. The intent-vs-reality story in metrics
  # (configured remote-as 65102, oper state stuck at active/idle, prefixes 0)
  # gets a matching log narrative a student can correlate to via labels.
  # The configured IP doesn't sit on the interface's subnet — that's the
  # actual misconfiguration this lab models.
  # -------------------------------------------------------------------------
  - id: srl1_broken_peer_logs
    signal_type: logs
    name: srl1_broken_peer_logs
    rate: 0.02               # ~1 line every 50s — sustained, not spammy
    labels:
      device: srl1
      pipeline: direct
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      peer_address: "10.1.99.2"
      netpanda: bethepacket
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor 10.1.99.2: connection refused — peer not reachable on configured subnet"
        - message: "BGP neighbor 10.1.99.2: TCP session establishment failed (no route to host)"
        - message: "BGP neighbor 10.1.99.2: configured remote-as 65102 but peer never responded; FSM stuck in active"
      severity_weights:
        warning: 0.5
        error: 0.5
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 1

  # =========================================================================
  # srl2 — same three streams, but emitted as RFC 5424 syslog over UDP
  # to Vector. Vector decodes, promotes the SD payload to Loki labels,
  # and ships to the same Loki srl1 pushes to directly.
  # =========================================================================
  - id: srl2_system_logs
    signal_type: logs
    name: srl2_system_logs
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      netpanda: bethepacket
    dynamic_labels:
      - key: vendor_facility_process
        values: ["MGMT", "AAA", "CHASSIS"]
    log_generator:
      type: template
      templates:
        - message: "mgmt|2456|17|00071|Configuration committed by user {user}"
          field_pools:
            user: ["netobs", "admin"]
        - message: "aaa|2310|17|00045|User {user} logged in via {method}"
          field_pools:
            user: ["netobs", "admin"]
            method: ["ssh", "console", "api"]
        - message: "chassis|1044|8|00012|Temperature sensor {sensor}: {temp}C (threshold: 70C)"
          field_pools:
            sensor: ["inlet", "outlet", "cpu"]
            temp: ["31", "34", "37", "40"]
      severity_weights:
        info: 0.8
        warn: 0.15
        error: 0.05
    encoder:
      type: syslog
      hostname: srl2
      app_name: srlinux
    sink:
      type: udp
      address: "vector:1514"

  - id: srl2_updown_logs
    signal_type: logs
    name: srl2_updown_logs
    rate: 0.05
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      netpanda: bethepacket
    dynamic_labels:
      - key: interface
        values: ["ethernet-1/1", "ethernet-1/10"]
      - key: interface_status
        values: ["up", "down"]
    log_generator:
      type: template
      templates:
        - message: "Interface state transition observed (operational state changed)"
      severity_weights:
        warning: 1.0
    encoder:
      type: syslog
      hostname: srl2
      app_name: srlinux
    sink:
      type: udp
      address: "vector:1514"

  # srl2 — broken interface ethernet-1/11 stuck-down story (via Vector)
  - id: srl2_broken_interface_logs
    signal_type: logs
    name: srl2_broken_interface_logs
    rate: 0.02
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      interface: "ethernet-1/11"
      interface_status: "down"
      netpanda: bethepacket
    log_generator:
      type: template
      templates:
        - message: "Interface ethernet-1/11: admin-up but operational down — no link partner detected"
        - message: "Interface ethernet-1/11: still no link, last seen up: never since boot"
        - message: "Interface ethernet-1/11: physical layer reports cable absent or far-end unresponsive"
      severity_weights:
        warning: 1.0
    encoder:
      type: syslog
      hostname: srl2
      app_name: srlinux
    sink:
      type: udp
      address: "vector:1514"

  - id: srl2_bgp_logs
    signal_type: logs
    name: srl2_bgp_logs
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      netpanda: bethepacket
    dynamic_labels:
      - key: peer_address
        values: ["10.1.2.1", "10.1.7.1"]
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor {peer_addr}: state changed to {state}"
          field_pools:
            peer_addr: ["10.1.2.1", "10.1.7.1"]
            state: ["established", "active", "open-confirm", "idle"]
      severity_weights:
        info: 0.7
        warning: 0.25
        error: 0.05
    encoder:
      type: syslog
      hostname: srl2
      app_name: srlinux
    sink:
      type: udp
      address: "vector:1514"

  # srl2 — broken BGP peer 10.1.11.1 (configured remote-as 65101, but peer
  # IP is from a subnet that doesn't sit on the configured interface).
  - id: srl2_broken_peer_logs
    signal_type: logs
    name: srl2_broken_peer_logs
    rate: 0.02
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      peer_address: "10.1.11.1"
      netpanda: bethepacket
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor 10.1.11.1: connection refused — peer not reachable on configured subnet"
        - message: "BGP neighbor 10.1.11.1: TCP session establishment failed (no route to host)"
        - message: "BGP neighbor 10.1.11.1: configured remote-as 65101 but peer never responded; FSM stuck in active"
      severity_weights:
        warning: 0.5
        error: 0.5
    encoder:
      type: syslog
      hostname: srl2
      app_name: srlinux
    sink:
      type: udp
      address: "vector:1514"
