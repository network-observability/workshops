# Log scenarios for srl1 and srl2 — direct push to Loki.
#
# Schema: sonda v2. Logs use `log_generator:` (NOT `generator:`); the
# discriminator was renamed in v2.
#
# Three log streams per device:
#   1. system_logs       — mgmt / aaa / chassis events; rotates vendor_facility_process
#   2. updown_logs       — interface UPDOWN events (drives PeerInterfaceFlapping alert)
#                          interface label rotates via dynamic_labels.
#   3. bgp_logs          — BGP session state changes for the broken peer; gives a
#                          log story that correlates with the bgp_oper_state metric.
#
# Stream labels mirror what webinar-completed's logstash pipeline produced
# (see notes/sonda-audit-2026-04-27.md §4 for the side-by-side).
---
version: 2

scenario_name: autocon5-all-logs
category: network
description: "AutoCon5 syslog + UPDOWN + BGP logs for srl1 and srl2."

defaults:
  rate: 0.05
  # Default encoder for logs is json_lines (per encoders.md), so we omit it.
  sink:
    type: loki
    url: "${LOKI_URL:-http://loki:3001}"

scenarios:

  # =========================================================================
  # srl1 — general system logs (mgmt / aaa / chassis)
  #
  # vendor_facility_process rotates across the three subsystems via
  # dynamic_labels so each stream matches what the webinar lab produced
  # from real SR Linux syslog.
  # =========================================================================
  - id: srl1_system_logs
    signal_type: logs
    name: srl1_system_logs
    labels:
      device: srl1
      type: srlinux            # matches webinar logstash input tag
      vendor_facility: srlinux
      netpanda: bethepacket    # structured-metadata demo (mirrors webinar)
    dynamic_labels:
      - key: vendor_facility_process
        values: ["MGMT", "AAA", "CHASSIS"]
    log_generator:
      type: template
      templates:
        - message: "mgmt|2456|17|00071|Configuration committed by user {user}"
          field_pools:
            user: ["netobs", "admin"]
        - message: "aaa|2310|17|00045|User {user} logged in via {method}"
          field_pools:
            user: ["netobs", "admin"]
            method: ["ssh", "console", "api"]
        - message: "chassis|1044|8|00012|Temperature sensor {sensor}: {temp}C (threshold: 70C)"
          field_pools:
            sensor: ["inlet", "outlet", "cpu"]
            temp: ["32", "35", "38", "41"]
      # severity_weights drives the body's `severity` field. We removed the
      # static `level: info` label so the stream label and body don't
      # contradict each other.
      severity_weights:
        info: 0.8
        warn: 0.15
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 10

  # -------------------------------------------------------------------------
  # srl1 — interface UPDOWN events
  # Triggers PeerInterfaceFlapping (loki/rules: count_over_time UPDOWN > 3 in 2m).
  # interface rotates across three peer links so the alert can fire with
  # different `(device, interface)` tuples — not always ethernet-1/1.
  # -------------------------------------------------------------------------
  - id: srl1_updown_logs
    signal_type: logs
    name: srl1_updown_logs
    rate: 0.05               # ~6 events / 2 min, exceeds the alert's threshold
    labels:
      device: srl1
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      netpanda: bethepacket
    dynamic_labels:
      - key: interface
        values: ["ethernet-1/1", "ethernet-1/10", "ethernet-1/11"]
      - key: interface_status
        values: ["up", "down"]
    log_generator:
      type: template
      templates:
        - message: "Interface state transition observed (operational state changed)"
      severity_weights:
        warning: 1.0
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 5

  # -------------------------------------------------------------------------
  # srl1 — BGP session events (correlates with bgp_oper_state metric)
  # peer rotates over the three configured peers so the broken-peer story
  # in metrics has a matching log story.
  # -------------------------------------------------------------------------
  - id: srl1_bgp_logs
    signal_type: logs
    name: srl1_bgp_logs
    labels:
      device: srl1
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      netpanda: bethepacket
    dynamic_labels:
      - key: peer
        values: ["10.1.2.2", "10.1.7.2", "10.1.99.2"]
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor {peer}: state changed to {state}"
          field_pools:
            peer: ["10.1.2.2", "10.1.7.2", "10.1.99.2"]
            state: ["established", "active", "open-confirm", "idle"]
      severity_weights:
        info: 0.7
        warning: 0.25
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 10

  # =========================================================================
  # srl2 — same three streams, different peers/values
  # =========================================================================
  - id: srl2_system_logs
    signal_type: logs
    name: srl2_system_logs
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      netpanda: bethepacket
    dynamic_labels:
      - key: vendor_facility_process
        values: ["MGMT", "AAA", "CHASSIS"]
    log_generator:
      type: template
      templates:
        - message: "mgmt|2456|17|00071|Configuration committed by user {user}"
          field_pools:
            user: ["netobs", "admin"]
        - message: "aaa|2310|17|00045|User {user} logged in via {method}"
          field_pools:
            user: ["netobs", "admin"]
            method: ["ssh", "console", "api"]
        - message: "chassis|1044|8|00012|Temperature sensor {sensor}: {temp}C (threshold: 70C)"
          field_pools:
            sensor: ["inlet", "outlet", "cpu"]
            temp: ["31", "34", "37", "40"]
      severity_weights:
        info: 0.8
        warn: 0.15
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 10

  - id: srl2_updown_logs
    signal_type: logs
    name: srl2_updown_logs
    rate: 0.05
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: UPDOWN
      netpanda: bethepacket
    dynamic_labels:
      - key: interface
        values: ["ethernet-1/1", "ethernet-1/10", "ethernet-1/11"]
      - key: interface_status
        values: ["up", "down"]
    log_generator:
      type: template
      templates:
        - message: "Interface state transition observed (operational state changed)"
      severity_weights:
        warning: 1.0
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 5

  - id: srl2_bgp_logs
    signal_type: logs
    name: srl2_bgp_logs
    labels:
      device: srl2
      type: srlinux
      vendor_facility: srlinux
      vendor_facility_process: BGP
      netpanda: bethepacket
    dynamic_labels:
      - key: peer
        values: ["10.1.2.1", "10.1.7.1", "10.1.11.1"]
    log_generator:
      type: template
      templates:
        - message: "BGP neighbor {peer}: state changed to {state}"
          field_pools:
            peer: ["10.1.2.1", "10.1.7.1", "10.1.11.1"]
            state: ["established", "active", "open-confirm", "idle"]
      severity_weights:
        info: 0.7
        warning: 0.25
        error: 0.05
    sink:
      type: loki
      url: "${LOKI_URL:-http://loki:3001}"
      batch_size: 10
