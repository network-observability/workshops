# srl1 telemetry — pushed directly into Prometheus via remote_write.
# Broken-on-purpose: BGP peer 10.1.99.2 and interface ethernet-1/11.
---
version: 2

scenario_name: autocon5-srl1-metrics
category: network
description: "AutoCon5 srl1 telemetry — BGP, interfaces, system, uptime."

defaults:
  rate: 0.1
  encoder:
    type: remote_write
  sink:
    type: remote_write
    url: "${PROMETHEUS_REMOTE_WRITE_URL:-http://prometheus:9090/api/v1/write}"

scenarios:
  # BGP peers
  - id: bgp_peer_10_1_2_2
    signal_type: metrics
    pack: srlinux_gnmi_bgp
    labels:
      device: srl1
      pipeline: direct
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"

  - id: bgp_peer_10_1_7_2
    signal_type: metrics
    pack: srlinux_gnmi_bgp
    labels:
      device: srl1
      pipeline: direct
      peer_address: "10.1.7.2"
      neighbor_asn: "65102"

  - id: bgp_peer_10_1_99_2_broken
    signal_type: metrics
    pack: srlinux_gnmi_bgp
    labels:
      device: srl1
      pipeline: direct
      peer_address: "10.1.99.2"
      neighbor_asn: "65102"
    overrides:
      bgp_neighbor_state:
        generator:
          type: constant
          value: 4.0
      bgp_oper_state:
        generator:
          type: constant
          value: 5.0
      bgp_received_routes:
        generator:
          type: constant
          value: 0.0
      bgp_prefixes_accepted:
        generator:
          type: constant
          value: 0.0

  # Interfaces
  - id: intf_ethernet_1_1
    signal_type: metrics
    pack: srlinux_gnmi_interface
    labels:
      device: srl1
      pipeline: direct
      name: "ethernet-1/1"

  - id: intf_ethernet_1_10
    signal_type: metrics
    pack: srlinux_gnmi_interface
    labels:
      device: srl1
      pipeline: direct
      name: "ethernet-1/10"

  - id: intf_ethernet_1_11_broken
    signal_type: metrics
    pack: srlinux_gnmi_interface
    labels:
      device: srl1
      pipeline: direct
      name: "ethernet-1/11"
    overrides:
      interface_oper_state:
        generator:
          type: constant
          value: 2.0
      interface_in_octets:
        generator:
          type: constant
          value: 0.0
      interface_out_octets:
        generator:
          type: constant
          value: 0.0

  # Reachability
  - id: ping_srl1
    signal_type: metrics
    pack: srlinux_ping
    labels:
      device: srl1
      pipeline: direct

  # System: CPU + memory + uptime
  - id: system_cpu_used
    signal_type: metrics
    name: cpu_used
    labels:
      device: srl1
      pipeline: direct
      slot: A
      index: "0"
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 15.0
      offset: 25.0
      period_secs: 120.0
    jitter: 2.0

  - id: system_memory_utilization
    signal_type: metrics
    name: memory_utilization
    labels:
      device: srl1
      pipeline: direct
      slot: A
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 8.0
      offset: 42.0
      period_secs: 240.0
    jitter: 1.0

  # device-health.json's template variable does `label_values(device_uptime, device)`;
  # without this metric the dashboard's device picker is empty.
  - id: system_uptime
    signal_type: metrics
    name: device_uptime
    labels:
      device: srl1
      pipeline: direct
      collection_type: snmp
    generator:
      type: step
      start: 36000.0       # 6 minutes "of uptime" at start
      step_size: 100.0     # +1s of uptime per tick at rate 0.1
