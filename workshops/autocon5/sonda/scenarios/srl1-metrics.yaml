# Sonda scenarios for srl1 — direct push via Prometheus remote_write
#
# This replaces both containerlab (srl1 device) and telegraf-01.
# Metrics are pushed directly to Prometheus, matching the exact schema
# that Telegraf would produce from gNMI/SNMP collection.
#
# Sink: remote_write → prometheus:9090/api/v1/write
scenarios:
  # ---------------------------------------------------------------------------
  # BGP metrics — peer 10.1.2.2 (established)
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: bgp_admin_state
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.2.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_oper_state
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.2.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_received_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.2.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 10.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_sent_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.2.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 10.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_active_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.2.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 10.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  # ---------------------------------------------------------------------------
  # BGP metrics — peer 10.1.7.2 (established)
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: bgp_admin_state
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.7.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_oper_state
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.7.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_received_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.7.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 10.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_sent_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.7.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 10.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_active_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.7.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 10.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  # ---------------------------------------------------------------------------
  # BGP metrics — peer 10.1.99.2 (broken — intentional mismatch)
  # admin_state=enable but oper_state=active (not established)
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: bgp_admin_state
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.99.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_oper_state
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.99.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 5.0  # active (not established) — triggers BgpSessionNotUp alert
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: bgp_received_routes
    rate: 0.1
    labels:
      device: srl1
      peer_address: "10.1.99.2"
      afi_safi_name: ipv4-unicast
      name: default
    generator:
      type: constant
      value: 0.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  # ---------------------------------------------------------------------------
  # Interface metrics — ethernet-1/1
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: interface_admin_state
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/1
      intf_role: peer
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_oper_state
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/1
      intf_role: peer
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_in_octets
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/1
      intf_role: peer
    generator:
      type: sawtooth
      min: 0.0
      max: 500000000.0
      period_secs: 300
    jitter: 1000000.0
    jitter_seed: 42
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_out_octets
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/1
      intf_role: peer
    generator:
      type: sawtooth
      min: 0.0
      max: 400000000.0
      period_secs: 300
    jitter: 800000.0
    jitter_seed: 43
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  # ---------------------------------------------------------------------------
  # Interface metrics — ethernet-1/10
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: interface_admin_state
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/10
      intf_role: peer
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_oper_state
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/10
      intf_role: peer
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_in_octets
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/10
      intf_role: peer
    generator:
      type: sawtooth
      min: 0.0
      max: 300000000.0
      period_secs: 240
    jitter: 750000.0
    jitter_seed: 44
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_out_octets
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/10
      intf_role: peer
    generator:
      type: sawtooth
      min: 0.0
      max: 250000000.0
      period_secs: 240
    jitter: 600000.0
    jitter_seed: 45
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  # ---------------------------------------------------------------------------
  # Interface metrics — ethernet-1/11 (broken link)
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: interface_admin_state
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/11
      intf_role: peer
    generator:
      type: constant
      value: 1.0
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: interface_oper_state
    rate: 0.1
    labels:
      device: srl1
      name: ethernet-1/11
      intf_role: peer
    generator:
      type: constant
      value: 2.0  # down — triggers InterfaceAdminUpOperDown
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  # ---------------------------------------------------------------------------
  # System metrics
  # ---------------------------------------------------------------------------
  - signal_type: metrics
    name: cpu_used
    rate: 0.1
    labels:
      device: srl1
      slot: A
    generator:
      type: sine
      amplitude: 15.0
      period_secs: 120
      offset: 25.0
    jitter: 2.0
    jitter_seed: 50
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"

  - signal_type: metrics
    name: memory_used
    rate: 0.1
    labels:
      device: srl1
      slot: A
    generator:
      type: sine
      amplitude: 5.0
      period_secs: 180
      offset: 45.0
    jitter: 1.0
    jitter_seed: 51
    encoder: { type: remote_write }
    sink:
      type: remote_write
      url: "http://prometheus:9090/api/v1/write"
