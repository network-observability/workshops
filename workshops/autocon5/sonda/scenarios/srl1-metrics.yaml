# srl1 telemetry — RAW gNMI shape (`srl_*` names + `source` tag).
# Pushed via Prom remote_write to telegraf-srl1, which normalizes the
# names and tags to the canonical schema and re-exposes them as a
# Prometheus scrape target. Broken-on-purpose: BGP peer 10.1.99.2 and
# interface ethernet-1/11.
---
version: 2

scenario_name: autocon5-srl1-metrics
category: network
description: "AutoCon5 srl1 telemetry — raw gNMI shape, normalized by telegraf-srl1."

defaults:
  rate: 0.1
  encoder:
    type: remote_write
  sink:
    type: remote_write
    url: "${TELEGRAF_SRL1_RECEIVE_URL:-http://telegraf-srl1:1316/api/v1/write}"

scenarios:
  # BGP peers
  - id: bgp_peer_10_1_2_2
    signal_type: metrics
    pack: srlinux_gnmi_bgp_raw
    labels:
      source: srl1
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"

  - id: bgp_peer_10_1_7_2
    signal_type: metrics
    pack: srlinux_gnmi_bgp_raw
    labels:
      source: srl1
      peer_address: "10.1.7.2"
      neighbor_asn: "65102"

  - id: bgp_peer_10_1_99_2_broken
    signal_type: metrics
    pack: srlinux_gnmi_bgp_raw
    labels:
      source: srl1
      peer_address: "10.1.99.2"
      neighbor_asn: "65102"
    overrides:
      srl_bgp_neighbor_state:
        generator:
          type: constant
          value: 4.0
      srl_bgp_oper_state:
        generator:
          type: constant
          value: 5.0
      srl_bgp_received_routes:
        generator:
          type: constant
          value: 0.0
      srl_bgp_prefixes_accepted:
        generator:
          type: constant
          value: 0.0

  # Interfaces
  - id: intf_ethernet_1_1
    signal_type: metrics
    pack: srlinux_gnmi_interface_raw
    labels:
      source: srl1
      name: "ethernet-1/1"

  - id: intf_ethernet_1_10
    signal_type: metrics
    pack: srlinux_gnmi_interface_raw
    labels:
      source: srl1
      name: "ethernet-1/10"

  - id: intf_ethernet_1_11_broken
    signal_type: metrics
    pack: srlinux_gnmi_interface_raw
    labels:
      source: srl1
      name: "ethernet-1/11"
    overrides:
      srl_interface_oper_state:
        generator:
          type: constant
          value: 2.0
      srl_interface_in_octets:
        generator:
          type: constant
          value: 0.0
      srl_interface_out_octets:
        generator:
          type: constant
          value: 0.0

  # Reachability
  - id: ping_srl1
    signal_type: metrics
    pack: srlinux_ping
    labels:
      source: srl1

  # System: CPU + memory + uptime — already canonical, telegraf-srl1
  # passes them through with the device-tag rename and intf_role derive.
  - id: system_cpu_used
    signal_type: metrics
    name: cpu_used
    labels:
      source: srl1
      slot: A
      index: "0"
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 15.0
      offset: 25.0
      period_secs: 120.0
    jitter: 2.0

  - id: system_memory_utilization
    signal_type: metrics
    name: memory_utilization
    labels:
      source: srl1
      slot: A
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 8.0
      offset: 42.0
      period_secs: 240.0
    jitter: 1.0

  # device-health.json's template variable does `label_values(device_uptime, device)`;
  # without this metric the dashboard's device picker is empty.
  - id: system_uptime
    signal_type: metrics
    name: device_uptime
    labels:
      source: srl1
      collection_type: gnmi
    generator:
      type: step
      start: 36000.0       # 6 minutes "of uptime" at start
      step_size: 100.0     # +1s of uptime per tick at rate 0.1
