# srl2 telemetry — RAW Cisco-style SNMP shape (`ifHC*`, `bgpPeer*`,
# `cbgpPeer*` names + `agent_host` / `ifDescr` / `bgpPeerRemoteAddr`
# tags). Scraped by telegraf-srl2 from sonda-server, which renames
# everything to the canonical schema and re-exposes them as a Prometheus
# scrape target. Broken-on-purpose: BGP peer 10.1.11.1 and interface
# ethernet-1/11.
#
# Cascade-affected entries carry a `while:` clause that pauses them while
# a matching cascade scenario is running. See srl1-metrics.yaml header
# for the inversion-pattern rationale.
---
version: 2
kind: runnable

scenario_name: autocon5-srl2-metrics
category: network
description: "AutoCon5 srl2 telemetry — raw SNMP shape, normalized by telegraf-srl2."

defaults:
  rate: 0.1
  # Required by sonda when an entry has `while:`. Effectively forever.
  duration: 8760h

scenarios:
  # BGP peers
  - id: bgp_peer_10_1_2_1
    signal_type: metrics
    pack: cisco_snmp_bgp_raw
    labels:
      agent_host: srl2
      bgpPeerRemoteAddr: "10.1.2.1"
      bgpPeerRemoteAs: "65101"
    while:
      scenario_name: autocon5-cascade-srl2-bgp-10-1-2-1
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open

  - id: bgp_peer_10_1_7_1
    signal_type: metrics
    pack: cisco_snmp_bgp_raw
    labels:
      agent_host: srl2
      bgpPeerRemoteAddr: "10.1.7.1"
      bgpPeerRemoteAs: "65101"
    while:
      scenario_name: autocon5-cascade-srl2-bgp-10-1-7-1
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open

  - id: bgp_peer_10_1_11_1_broken
    signal_type: metrics
    pack: cisco_snmp_bgp_raw
    labels:
      agent_host: srl2
      bgpPeerRemoteAddr: "10.1.11.1"
      bgpPeerRemoteAs: "65101"
    overrides:
      bgpPeerState:
        generator:
          type: constant
          value: 4.0
      cbgpPeerOperStatus:
        generator:
          type: constant
          value: 5.0
      bgpPeerInPrefixes:
        generator:
          type: constant
          value: 0.0
      cbgpPeerAcceptedPrefixes:
        generator:
          type: constant
          value: 0.0

  # Interfaces
  - id: intf_ethernet_1_1
    signal_type: metrics
    pack: cisco_snmp_interface_raw
    labels:
      agent_host: srl2
      ifDescr: "ethernet-1/1"
    while:
      scenario_name: autocon5-cascade-srl2-intf-ethernet-1-1
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open

  - id: intf_ethernet_1_10
    signal_type: metrics
    pack: cisco_snmp_interface_raw
    labels:
      agent_host: srl2
      ifDescr: "ethernet-1/10"
    while:
      scenario_name: autocon5-cascade-srl2-intf-ethernet-1-10
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open

  - id: intf_ethernet_1_11_broken
    signal_type: metrics
    pack: cisco_snmp_interface_raw
    labels:
      agent_host: srl2
      ifDescr: "ethernet-1/11"
    overrides:
      ifOperStatus:
        generator:
          type: constant
          value: 2.0
      ifHCInOctets:
        generator:
          type: step
          start: 0.0
          step_size: 0.0
      ifHCOutOctets:
        generator:
          type: step
          start: 0.0
          step_size: 0.0

  # Reachability
  - id: ping_srl2
    signal_type: metrics
    pack: srlinux_ping
    labels:
      agent_host: srl2
      collection_type: snmp

  # System: CPU + memory + uptime — already canonical, telegraf-srl2
  # passes them through with the agent_host -> device rename.
  - id: system_cpu_used
    signal_type: metrics
    name: cpu_used
    metric_type: gauge
    help: "Per-CPU utilization percent."
    labels:
      agent_host: srl2
      slot: A
      index: "0"
      collection_type: snmp
    generator:
      type: sine
      amplitude: 18.0
      offset: 30.0
      period_secs: 150.0
    jitter: 2.0

  - id: system_memory_utilization
    signal_type: metrics
    name: memory_utilization
    metric_type: gauge
    help: "Memory utilization percent on the device."
    labels:
      agent_host: srl2
      slot: A
      collection_type: snmp
    generator:
      type: sine
      amplitude: 6.0
      offset: 38.0
      period_secs: 200.0
    jitter: 1.0

  - id: system_uptime
    signal_type: metrics
    name: device_uptime
    metric_type: counter
    help: "Seconds since device boot."
    labels:
      agent_host: srl2
      collection_type: snmp
    generator:
      type: step
      start: 36000.0
      step_size: 100.0
