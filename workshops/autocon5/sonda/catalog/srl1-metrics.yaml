# srl1 telemetry — RAW gNMI shape (`srl_*` names + `source` tag).
# Registered on sonda-server; telegraf-srl1 scrapes the aggregate /metrics
# endpoint and normalizes the shapes to the canonical schema.
# Broken-on-purpose: BGP peer 10.1.99.2 and interface ethernet-1/11.
#
# Cascade-affected entries (healthy peers + healthy interfaces) carry a
# `while:` clause that pauses them while a matching cascade scenario is
# running. `if_unresolved: open` keeps them emitting at rest (no cascade
# POSTed). Telegraf scrapes with `?include_state=running,unresolved` so
# paused entries fall out of the aggregate during a cascade — sonda's
# inversion pattern (see davidban77/sonda PR #438 docs, Pattern B).
---
version: 2
kind: runnable

scenario_name: autocon5-srl1-metrics
category: network
description: "AutoCon5 srl1 telemetry — raw gNMI shape, normalized by telegraf-srl1."

defaults:
  rate: 0.1
  # Required by sonda when an entry has `while:`. Effectively forever.
  duration: 8760h

scenarios:
  # BGP peers
  - id: bgp_peer_10_1_2_2
    signal_type: metrics
    pack: srlinux_gnmi_bgp_raw
    labels:
      source: srl1
      peer_address: "10.1.2.2"
      neighbor_asn: "65102"
    while:
      scenario_name: autocon5-cascade-srl1-bgp-10-1-2-2
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open

  - id: bgp_peer_10_1_7_2
    signal_type: metrics
    pack: srlinux_gnmi_bgp_raw
    labels:
      source: srl1
      peer_address: "10.1.7.2"
      neighbor_asn: "65102"
    while:
      scenario_name: autocon5-cascade-srl1-bgp-10-1-7-2
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open

  - id: bgp_peer_10_1_99_2_broken
    signal_type: metrics
    pack: srlinux_gnmi_bgp_raw
    labels:
      source: srl1
      peer_address: "10.1.99.2"
      neighbor_asn: "65102"
    overrides:
      srl_bgp_neighbor_state:
        generator:
          type: constant
          value: 4.0
      srl_bgp_oper_state:
        generator:
          type: constant
          value: 5.0
      srl_bgp_received_routes:
        generator:
          type: constant
          value: 0.0
      srl_bgp_prefixes_accepted:
        generator:
          type: constant
          value: 0.0

  # Interfaces
  #
  # Pattern C on the octet metrics: `delay.close.snap_to` opts the octet
  # step counters into `held` lifecycle on gate close, so `current_values`
  # retains the last running value during cascade DOWN (sonda PR #440).
  # `oper_state` deliberately has NO override — it should go to `paused`
  # so the cascade's `cascade_oper_state=2` takes over during DOWN.
  - id: intf_ethernet_1_1
    signal_type: metrics
    pack: srlinux_gnmi_interface_raw
    labels:
      source: srl1
      name: "ethernet-1/1"
    while:
      scenario_name: autocon5-cascade-srl1-intf-ethernet-1-1
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open
    overrides:
      srl_interface_in_octets:
        delay: {close: {duration: 0s, snap_to: 0}}
      srl_interface_out_octets:
        delay: {close: {duration: 0s, snap_to: 0}}

  - id: intf_ethernet_1_10
    signal_type: metrics
    pack: srlinux_gnmi_interface_raw
    labels:
      source: srl1
      name: "ethernet-1/10"
    while:
      scenario_name: autocon5-cascade-srl1-intf-ethernet-1-10
      ref: cascade_active
      op: "<"
      value: 1
      if_unresolved: open
    overrides:
      srl_interface_in_octets:
        delay: {close: {duration: 0s, snap_to: 0}}
      srl_interface_out_octets:
        delay: {close: {duration: 0s, snap_to: 0}}

  - id: intf_ethernet_1_11_broken
    signal_type: metrics
    pack: srlinux_gnmi_interface_raw
    labels:
      source: srl1
      name: "ethernet-1/11"
    overrides:
      srl_interface_oper_state:
        generator:
          type: constant
          value: 2.0
      srl_interface_in_octets:
        generator:
          type: step
          start: 0.0
          step_size: 0.0
      srl_interface_out_octets:
        generator:
          type: step
          start: 0.0
          step_size: 0.0

  # Reachability
  - id: ping_srl1
    signal_type: metrics
    pack: srlinux_ping
    labels:
      source: srl1

  # System: CPU + memory + uptime — already canonical, telegraf-srl1
  # passes them through with the device-tag rename and intf_role derive.
  - id: system_cpu_used
    signal_type: metrics
    name: cpu_used
    metric_type: gauge
    help: "Per-CPU utilization percent."
    labels:
      source: srl1
      slot: A
      index: "0"
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 15.0
      offset: 25.0
      period_secs: 120.0
    jitter: 2.0

  - id: system_memory_utilization
    signal_type: metrics
    name: memory_utilization
    metric_type: gauge
    help: "Memory utilization percent on the device."
    labels:
      source: srl1
      slot: A
      collection_type: gnmi
    generator:
      type: sine
      amplitude: 8.0
      offset: 42.0
      period_secs: 240.0
    jitter: 1.0

  # device-health.json's template variable does `label_values(device_uptime, device)`;
  # without this metric the dashboard's device picker is empty.
  - id: system_uptime
    signal_type: metrics
    name: device_uptime
    metric_type: counter
    help: "Seconds since device boot."
    labels:
      source: srl1
      collection_type: gnmi
    generator:
      type: step
      start: 36000.0       # 6 minutes "of uptime" at start
      step_size: 100.0     # +1s of uptime per tick at rate 0.1
