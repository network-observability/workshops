# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# AutoCon5 workshop tasks.
#
# Conventions:
# - `task up` brings the whole stack online (compose up -d --build).
# - `task down` stops everything but keeps volumes.
# - `task destroy` stops AND removes volumes (full reset).
# - `task logs SVC=<service>` follows a container's logs.
# - `task ps` shows what's running.
#
# Python helpers (load-infrahub, set-maintenance) run inside the uv-managed
# workspace env (see ../../pyproject.toml). Run `task setup` from the repo
# root once to populate it.

version: "3"

silent: true

vars:
  COMPOSE: docker compose
  COMPOSE_PROJECT_NAME: autocon5
  REPO_ROOT: '{{.USER_WORKING_DIR}}/../..'

env:
  COMPOSE_PROJECT_NAME: '{{.COMPOSE_PROJECT_NAME}}'

tasks:
  default:
    desc: Show the AutoCon5 workshop tasks
    cmds:
      - task --list-all

  # ---------------------------------------------------------------------
  # Pre-flight (delegates to the repo-shared preflight)
  # ---------------------------------------------------------------------
  preflight:
    desc: Check the environment is ready to run the workshop
    cmds:
      - bash ../../scripts/preflight.sh

  # ---------------------------------------------------------------------
  # Stack lifecycle
  # ---------------------------------------------------------------------
  up:
    desc: Build and start the full observability stack
    deps: [.ensure-env]
    cmds:
      - "{{.COMPOSE}} up -d --build"
      - echo ""
      - echo "Stack is starting. Useful URLs:"
      - echo "  Grafana       http://localhost:3000  (login - $GRAFANA_USER / $GRAFANA_PASSWORD)"
      - echo "  Prometheus    http://localhost:9090"
      - echo "  Alertmanager  http://localhost:9093"
      - echo "  Loki          http://localhost:3001"
      - echo "  Infrahub      http://localhost:8000"
      - echo "  Prefect       http://localhost:4200"
      - echo "  Sonda server  http://localhost:8085"
      - echo ""
      - echo "Next - load the source-of-truth data into Infrahub:"
      - echo "  task autocon5:load-infrahub  (or, from this dir, 'task load-infrahub')"

  down:
    desc: Stop the stack (keeps volumes / data)
    cmds:
      - "{{.COMPOSE}} down"

  destroy:
    desc: Stop the stack AND remove volumes (full reset)
    cmds:
      - "{{.COMPOSE}} down --volumes --remove-orphans"

  restart:
    desc: Restart the stack
    cmds:
      - task: down
      - task: up

  restart-flows:
    desc: Restart the prefect-flows container (re-registers the alert-receiver deployment)
    cmds:
      - "{{.COMPOSE}} restart prefect-flows"

  # ---------------------------------------------------------------------
  # Inspect / debug
  # ---------------------------------------------------------------------
  ps:
    desc: Show running services
    cmds:
      - "{{.COMPOSE}} ps"

  logs:
    desc: "Follow logs for a service (use SVC=<name>, default tails everything)"
    vars:
      SVC: '{{.SVC | default ""}}'
    cmds:
      - "{{.COMPOSE}} logs -f --tail=200 {{.SVC}}"

  exec:
    desc: "Exec a command in a container (SVC=<name> CMD=<command>)"
    vars:
      SVC: '{{.SVC}}'
      CMD: '{{.CMD | default "sh"}}'
    cmds:
      - "{{.COMPOSE}} exec {{.SVC}} {{.CMD}}"

  build:
    desc: "Rebuild a service (SVC=<name>)"
    cmds:
      - "{{.COMPOSE}} build {{.SVC}}"
      - "{{.COMPOSE}} up -d {{.SVC}}"

  # ---------------------------------------------------------------------
  # Data loading (uv-managed)
  # ---------------------------------------------------------------------
  load-infrahub:
    desc: Apply the workshop schema to Infrahub and load lab_vars.yml
    deps: [.ensure-uv]
    cmds:
      - bash scripts/load-infrahub.sh

  # ---------------------------------------------------------------------
  # Sonda scenario controls — replaces `netobs utils device-interface-flap`
  # ---------------------------------------------------------------------
  scenarios:
    desc: List the scenarios currently registered with sonda-server
    cmds:
      - 'curl -sf http://localhost:8085/scenarios | python3 -m json.tool'

  flap-interface:
    desc: "Trigger an interface UPDOWN log burst (DEVICE=srl1 INTERFACE=ethernet-1/1)"
    vars:
      DEVICE: '{{.DEVICE | default "srl1"}}'
      INTERFACE: '{{.INTERFACE | default "ethernet-1/1"}}'
    cmds:
      - bash ../../scripts/sonda-trigger.sh flap-interface "{{.DEVICE}}" "{{.INTERFACE}}"

  set-maintenance:
    desc: "Toggle a device's maintenance flag in Infrahub (DEVICE=srl1 STATE=true|false)"
    deps: [.ensure-uv]
    vars:
      DEVICE: '{{.DEVICE | default "srl1"}}'
      STATE: '{{.STATE | default "true"}}'
    cmds:
      - |
        STATE_FLAG=$(echo "{{.STATE}}" | tr '[:upper:]' '[:lower:]')
        case "$STATE_FLAG" in
          true|1|yes|on)   FLAG="--state" ;;
          false|0|no|off)  FLAG="--clear" ;;
          *) echo "STATE must be true|false (got '{{.STATE}}')" >&2; exit 2 ;;
        esac
        cd ../.. && uv run --package autocon5-workshop \
          autocon5 maintenance --device "{{.DEVICE}}" $FLAG

  status:
    desc: Quick health check on every service in the stack
    deps: [.ensure-uv]
    cmds:
      - cd ../.. && uv run --package autocon5-workshop autocon5 status

  alerts:
    desc: "List active Alertmanager alerts (use FILTER='alertname=BgpSessionNotUp' to narrow)"
    deps: [.ensure-uv]
    vars:
      FILTER: '{{.FILTER | default ""}}'
    cmds:
      - |
        if [ -n "{{.FILTER}}" ]; then
          cd ../.. && uv run --package autocon5-workshop autocon5 alerts -l "{{.FILTER}}"
        else
          cd ../.. && uv run --package autocon5-workshop autocon5 alerts
        fi

  evidence:
    desc: "Show the evidence bundle the Prefect flow would collect (DEVICE=srl1 PEER=10.1.99.2)"
    deps: [.ensure-uv]
    vars:
      DEVICE: '{{.DEVICE | default "srl1"}}'
      PEER: '{{.PEER | default "10.1.99.2"}}'
    cmds:
      - |
        cd ../.. && uv run --package autocon5-workshop autocon5 evidence \
          "{{.DEVICE}}" "{{.PEER}}"

  try-it:
    desc: "Guided tour through the four canonical Part 3 paths (use AUTO=1 to skip pauses)"
    deps: [.ensure-uv]
    vars:
      AUTO: '{{.AUTO | default ""}}'
    cmds:
      - |
        if [ -n "{{.AUTO}}" ]; then
          cd ../.. && uv run --package autocon5-workshop autocon5 try-it --auto
        else
          cd ../.. && uv run --package autocon5-workshop autocon5 try-it
        fi

  # ---------------------------------------------------------------------
  # Internal helpers
  # ---------------------------------------------------------------------
  .ensure-env:
    internal: true
    cmds:
      - |
        if [ ! -f .env ]; then
          echo "Copying .env.example to .env (edit it if you want to override defaults)"
          cp .env.example .env
        fi

  .ensure-uv:
    internal: true
    cmds:
      - |
        if ! command -v uv >/dev/null 2>&1; then
          echo "ERROR: uv is not installed. Run from the repo root:" >&2
          echo "  curl -LsSf https://astral.sh/uv/install.sh | sh" >&2
          echo "Then run 'task setup' to install workshop deps." >&2
          exit 1
        fi
        if [ ! -d ../../.venv ]; then
          echo "Workspace .venv missing. Running 'uv sync' for you..."
          (cd ../.. && uv sync)
        fi
