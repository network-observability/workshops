name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "workshops/autocon5/README.md"
      - "workshops/autocon5/guides/**"
      - "README.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "workshops/autocon5/README.md"
      - "workshops/autocon5/guides/**"
      - "README.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# One in-flight deploy at a time; let new pushes cancel the queued one.
concurrency:
  group: docs-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs-material's git-revision-date plugin reads history

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install docs dependency group
        run: uv sync --group docs

      - name: Build site
        run: uv run mkdocs build --strict

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
