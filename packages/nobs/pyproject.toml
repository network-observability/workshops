[project]
name = "nobs"
version = "0.1.0"
description = "Network observability operator toolkit — CLI for the workshops repo and beyond."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "typer[all]>=0.12,<1",       # brings Rich
  "infrahub-sdk[ctl]>=1.0,<2.0",
  "requests>=2.31",
  "httpx>=0.27",
  "pydantic>=2.6,<3",
  "python-dotenv>=1.0",
  "pyyaml>=6.0",
  "psutil>=5.9",
  "autocon5-workshop",
]

[project.scripts]
nobs = "nobs.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nobs"]

[tool.uv]
package = true

[tool.uv.sources]
autocon5-workshop = { workspace = true }
